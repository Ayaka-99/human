name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Downloads/human_obversation/human-observatory-web/package-lock.json

      - name: Install dependencies
        working-directory: Downloads/human_obversation/human-observatory-web
        run: npm ci

      - name: Build
        working-directory: Downloads/human_obversation/human-observatory-web
        run: npx next build --webpack

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Downloads/human_obversation/human-observatory-web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
